project:
  name: multi_ligand_am1bcc
  input_structure: data/protein_two_ligands.pdb
  output_dir: prepared/multi_ligand_am1bcc

structure:
  keep_crystal_waters: true
  altloc_policy: highest_occupancy
  remove_unknown_heterogens: false
  preserve_chain_ids: true
  remove_input_hydrogens: true

protein:
  forcefield: ff19SB
  water_model: TIP3P

protonation:
  ph: 7.0
  method: propka_xtb_his
  overrides: []
  histidine:
    neutral_tautomer_method: xtb
    xtb:
      executable: xtb
      model: gfn2
      mode: opt
      opt_level: loose
      solvent: water
      cutoff_angstrom: 5.0
      extra_args: []

disulfides:
  auto_detect: true
  detection_cutoff_angstrom: 2.2
  force: []
  forbid: []

ligands:
  - id: SUB_501
    selector:
      chain: B
      resname: SUB
      resid: 501
      icode: null
    net_charge: -1
    multiplicity: 1
    atom_types: gaff2
    charge_method: am1bcc
    user_mol2: null
    qmmesp: null
  - id: COF_601
    selector:
      chain: C
      resname: COF
      resid: 601
      icode: null
    net_charge: 0
    multiplicity: 1
    atom_types: gaff2
    charge_method: am1bcc
    user_mol2: null
    qmmesp: null

solvation:
  enabled: true
  box: truncated_octahedron
  buffer_angstrom: 10.0
  neutralize: true
  salt_concentration_molar: 0.15
  positive_ion: Na+
  negative_ion: Cl-

validation:
  run_openmm_energy_check: true
  fail_on_warnings: false
  fail_on_missing_parameters: true
  fail_on_noninteger_ligand_charge: true

