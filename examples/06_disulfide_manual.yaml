project:
  name: disulfide_manual
  input_structure: data/disulfide_candidate.pdb
  output_dir: prepared/disulfide_manual

structure:
  keep_crystal_waters: true
  altloc_policy: fail
  remove_unknown_heterogens: false
  preserve_chain_ids: true
  remove_input_hydrogens: true

protein:
  forcefield: ff14SB
  water_model: TIP3P

protonation:
  ph: 7.0
  method: propka
  overrides:
    - selector:
        chain: A
        resname: CYS
        resid: 31
        icode: null
      state: CYX
      reason: Manual disulfide participant
    - selector:
        chain: A
        resname: CYS
        resid: 88
        icode: null
      state: CYX
      reason: Manual disulfide participant
  histidine:
    neutral_tautomer_method: manual
    xtb:
      executable: xtb
      model: gfn2
      mode: opt
      opt_level: loose
      solvent: water
      cutoff_angstrom: 5.0
      extra_args: []

disulfides:
  auto_detect: false
  detection_cutoff_angstrom: 2.2
  force:
    - a:
        chain: A
        resname: CYS
        resid: 31
        icode: null
      b:
        chain: A
        resname: CYS
        resid: 88
        icode: null
      reason: Manually curated disulfide
  forbid: []

ligands: []

solvation:
  enabled: true
  box: rectangular
  buffer_angstrom: 12.0
  neutralize: true
  salt_concentration_molar: 0.15
  positive_ion: Na+
  negative_ion: Cl-

validation:
  run_openmm_energy_check: true
  fail_on_warnings: false
  fail_on_missing_parameters: true
  fail_on_noninteger_ligand_charge: true

