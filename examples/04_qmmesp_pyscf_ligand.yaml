project:
  name: qmmesp_pyscf_ligand
  input_structure: data/protein_qm_ligand.pdb
  output_dir: prepared/qmmesp_pyscf_ligand

structure:
  keep_crystal_waters: true
  altloc_policy: highest_occupancy
  remove_unknown_heterogens: false
  preserve_chain_ids: true
  remove_input_hydrogens: true

protein:
  forcefield: ff19SB
  water_model: TIP3P

protonation:
  ph: 7.0
  method: propka_xtb_his
  overrides: []
  histidine:
    neutral_tautomer_method: xtb
    xtb:
      executable: xtb
      model: gfn2
      mode: opt
      opt_level: normal
      solvent: water
      cutoff_angstrom: 5.0
      extra_args: []

disulfides:
  auto_detect: true
  detection_cutoff_angstrom: 2.2
  force: []
  forbid: []

ligands:
  - id: SUB_501
    selector:
      chain: B
      resname: SUB
      resid: 501
      icode: null
    net_charge: -1
    multiplicity: 1
    atom_types: gaff2
    charge_method: qmmesp_pyscf
    user_mol2: null
    qmmesp:
      qm_engine: pyscf
      method: HF
      basis: "6-31G*"
      embedding_cutoff_angstrom: 12.0
      resp_fitting:
        backend: auto
        total_charge_constraint: true
        stage_2: true

solvation:
  enabled: true
  box: truncated_octahedron
  buffer_angstrom: 10.0
  neutralize: true
  salt_concentration_molar: 0.15
  positive_ion: Na+
  negative_ion: Cl-

validation:
  run_openmm_energy_check: true
  fail_on_warnings: false
  fail_on_missing_parameters: true
  fail_on_noninteger_ligand_charge: true

