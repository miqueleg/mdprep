project:
  name: gas_resp_pyscf_ligand
  input_structure: data/protein_gas_resp_ligand.pdb
  output_dir: prepared/gas_resp_pyscf_ligand

structure:
  keep_crystal_waters: true
  altloc_policy: highest_occupancy
  remove_unknown_heterogens: false
  preserve_chain_ids: true
  remove_input_hydrogens: true

protein:
  forcefield: ff19SB
  water_model: TIP3P

protonation:
  ph: 7.0
  method: manual_only
  overrides: []
  histidine:
    neutral_tautomer_method: xtb
    xtb:
      executable: xtb
      model: gfn2
      mode: opt
      opt_level: loose
      solvent: water
      cutoff_angstrom: 5.0
      extra_args: []

disulfides:
  auto_detect: true
  detection_cutoff_angstrom: 2.2
  force: []
  forbid: []

ligands:
  - id: SUB_501
    selector:
      chain: B
      resname: SUB
      resid: 501
      icode: null
    net_charge: 0
    multiplicity: 1
    atom_types: gaff2
    charge_method: gas_resp_pyscf
    user_mol2: null
    qmmesp:
      qm_engine: pyscf
      method: HF
      basis: "6-31G*"
      embedding_cutoff_angstrom: 12.0
      scf_charge: null
      scf_spin: null
      max_cycle: 100
      conv_tol: 1.0e-9
      grid:
        type: connolly
        vdw_scale_factors: [1.4, 1.6, 1.8, 2.0]
        points_per_atom_per_shell: 60
        exclude_inside_vdw_scale: 1.2
        max_points: 8000
      resp_fitting:
        backend: native
        total_charge_constraint: true
        restraint: resp
        restraint_a: 0.0005
        restraint_b: 0.1
        max_iter: 25
        convergence: 1.0e-6
        stage_2: true
      environment:
        include_protein: true
        include_waters: true
        include_other_ligands: true
        exclude_self_ligand: true

solvation:
  enabled: true
  box: truncated_octahedron
  buffer_angstrom: 10.0
  neutralize: true
  salt_concentration_molar: 0.15
  positive_ion: Na+
  negative_ion: Cl-

validation:
  run_openmm_energy_check: true
  fail_on_warnings: false
  fail_on_missing_parameters: true
  fail_on_noninteger_ligand_charge: true
